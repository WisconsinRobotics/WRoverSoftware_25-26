### ekf.yaml ###

# 1. LOCAL EKF (Odom frame) - Fuses IMU only for smooth local movement
ekf_filter_node_odom:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: odom

    # IMU0: Orientation, Angular Velocity, Linear Acceleration
    imu0: imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  False,  False,  False]
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true

# 2. GLOBAL EKF (Map frame) - Fuses IMU + GPS
ekf_filter_node_map:
  ros__parameters:
    frequency: 30.0
    sensor_timeout: 0.1
    two_d_mode: true
    publish_tf: true
    map_frame: map
    odom_frame: odom
    base_link_frame: base_link
    world_frame: map

    # IMU0 (Same as above)
    imu0: imu/data
    imu0_config: [false, false, false,
                  true,  true,  true,
                  false, false, false,
                  true,  true,  true,
                  False,  False,  False]
    imu0_differential: false
    imu0_remove_gravitational_acceleration: true

    # GPS (Input from NavSat Node)
    odom0: odometry/gps
    # Fuse X, Y, Z position from GPS
    odom0_config: [true,  true,  false,
                   false, false, false,
                   false, false, false,
                   false, false, false,
                   false, false, false]
    odom0_differential: false

# 3. NAVSAT TRANSFORM - Converts GPS Lat/Long to X/Y
navsat_transform:
  ros__parameters:
    frequency: 30.0
    # MAGNETIC DECLINATION: You MUST search Google for your city's value!
    # Example: New York is roughly -0.22 radians. 0.0 assumes True North = Magnetic North.
    magnetic_declination_radians: 0.04712 
    yaw_offset: 0.0
    zero_altitude: true
    broadcast_utm_transform: true
    publish_filtered_gps: true
    use_odometry_yaw: false
    wait_for_datum: false